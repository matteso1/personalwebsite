name: Sync Tor/I2P mirror

# Keeps the .onion + .b32.i2p mirrors on the VPS in lockstep with the
# clearnet site. Runs on every push to main (after Vercel rebuilds clearnet)
# and can be triggered manually.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: sync-mirror
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build
        run: npx astro build

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy
          chmod 600 ~/.ssh/deploy
          ssh-keyscan -p 22 -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync dist/ to mirror
        run: |
          rsync -az --delete --no-perms --omit-dir-times \
            -e "ssh -i ~/.ssh/deploy -o StrictHostKeyChecking=yes" \
            dist/ "root@${{ secrets.VPS_HOST }}:/srv/nils-site/"
